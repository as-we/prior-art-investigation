name: Link Validation

on:
  push:
    branches: [main, develop]
    paths:
      - 'docs/**/*.md'
      - '.github/workflows/link-validation.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'docs/**/*.md'
  schedule:
    # Weekly link validation (Sundays at 00:00 UTC)
    - cron: '0 0 * * 0'

jobs:
  validate-links:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Validate markdown links
        run: |
          # Install markdown link checker
          pip install markdown-link-checker
          
          # Check all markdown files
          find docs -name "*.md" -type f | while read file; do
            echo "Checking: $file"
            markdown-link-checker "$file" --offline
          done

      - name: Validate YAML frontmatter
        run: |
          pip install pyyaml
          python -c "
import os
import yaml
import sys

failed = False
for root, dirs, files in os.walk('docs'):
    for file in files:
        if file.endswith('.md') and 'prompt' in root:
            path = os.path.join(root, file)
            with open(path, 'r') as f:
                content = f.read()
                if content.startswith('---'):
                    try:
                        parts = content.split('---', 2)
                        if len(parts) >= 2:
                            yaml.safe_load(parts[1])
                            print(f'✓ {path}')
                    except yaml.YAMLError as e:
                        print(f'✗ {path}: {e}')
                        failed = True

if failed:
    sys.exit(1)
          "

      - name: Validate file references
        run: |
          python -c "
import os
import re

failed = False
for root, dirs, files in os.walk('docs'):
    for file in files:
        if file.endswith('.md'):
            path = os.path.join(root, file)
            with open(path, 'r') as f:
                for i, line in enumerate(f, 1):
                    # Find markdown links [text](path)
                    links = re.findall(r'\[(.+?)\]\((.+?)\)', line)
                    for text, link in links:
                        # Skip external URLs and anchors
                        if link.startswith(('http://', 'https://', '#')):
                            continue
                        
                        # Check if file exists (relative to doc root)
                        target = os.path.join(root, '..', link.split('#')[0])
                        target = os.path.normpath(target)
                        
                        if link and not os.path.exists(target):
                            print(f'✗ {path}:{i} - Link not found: {link}')
                            failed = True
                        else:
                            print(f'✓ {path}:{i} - {link}')

if failed:
    exit(1)
          "

  validate-structure:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify bilingual structure
        run: |
          # Check that en/ and ja/ have identical file structure
          EN_FILES="\$(find docs/en -name '*.md' | wc -l)"
          JA_FILES="\$(find docs/ja -name '*.md' | wc -l)"
          
          if [ "\$EN_FILES" != "\$JA_FILES" ]; then
            echo "❌ Structure mismatch: docs/en has \$EN_FILES files, docs/ja has \$JA_FILES files"
            exit 1
          fi
          
          echo "✓ Bilingual structure OK (\$EN_FILES files per language)"

      - name: Verify required files
        run: |
          REQUIRED_FILES=(
            "README.md"
            "LICENSE"
            "package.json"
            "docs/INSTALL.md"
            "docs/TROUBLESHOOTING.md"
            "docs/API.md"
            "docs/NAVIGATION.md"
            "docs/en/README.md"
            "docs/ja/README.md"
            "docs/en/kiro/settings/rules/oss-evaluation.md"
            "docs/ja/kiro/settings/rules/oss-evaluation.md"
            "scripts/setup.sh"
            "Makefile"
          )
          
          MISSING=()
          for file in "\${REQUIRED_FILES[@]}"; do
            if [ ! -f "\$file" ]; then
              MISSING+=("\$file")
            fi
          done
          
          if [ \${#MISSING[@]} -gt 0 ]; then
            echo "❌ Missing files:"
            printf '%s\n' "\${MISSING[@]}"
            exit 1
          fi
          
          echo "✓ All required files present"

  test-setup-script:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Test setup.sh (dry-run)
        run: |
          # Run setup script with --dry-run
          bash scripts/setup.sh --dry-run --language=en
          
          echo "✓ Setup script syntax OK"

  validate-npm-package:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Validate package.json
        run: |
          npm ls 2>&1 | head -20
          
          # Check that package name is correct
          NAME=$(jq -r '.name' package.json)
          if [ "\$NAME" != "@ma2tani/prior-art-investigation" ]; then
            echo "❌ Invalid package name: \$NAME"
            exit 1
          fi
          
          # Check that exports are correct
          jq '.exports' package.json | grep -q "docs/en" && echo "✓ Exports OK" || exit 1

  report-results:
    needs: [validate-links, validate-structure, test-setup-script, validate-npm-package]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Check workflow status
        run: |
          if [ "${{ needs.validate-links.result }}" != "success" ]; then
            echo "❌ Link validation failed"
            exit 1
          fi
          
          if [ "${{ needs.validate-structure.result }}" != "success" ]; then
            echo "❌ Structure validation failed"
            exit 1
          fi
          
          if [ "${{ needs.test-setup-script.result }}" != "success" ]; then
            echo "❌ Setup script test failed"
            exit 1
          fi
          
          if [ "${{ needs.validate-npm-package.result }}" != "success" ]; then
            echo "❌ npm package validation failed"
            exit 1
          fi
          
          echo "✅ All validations passed"

